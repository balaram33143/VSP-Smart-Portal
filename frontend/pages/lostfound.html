<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lost & Found | VSP Smart Portal</title>
<link rel="stylesheet" href="../css/style.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/feather-icons"></script>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">⚙</div>
    <div><div class="logo-title">VSP Portal</div><div class="logo-sub">RINL Vizag Steel</div></div>
  </div>
  <nav class="sidebar-nav">
    <a href="/" class="nav-item"><i data-feather="grid"></i><span>Dashboard</span></a>
    <a href="/pages/map.html" class="nav-item"><i data-feather="map-pin"></i><span>Township Map</span></a>
    <a href="/pages/machines.html" class="nav-item"><i data-feather="cpu"></i><span>Plant Status</span></a>
    <a href="/pages/lostfound.html" class="nav-item active"><i data-feather="search"></i><span>Lost & Found</span></a>
    <a href="/pages/accident.html" class="nav-item"><i data-feather="alert-triangle"></i><span>Accident Report</span></a>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-time" id="clock">--:--:--</div>
    <div class="sidebar-date" id="dateline"></div>
  </div>
</aside>

<main class="main-content">
  <header class="topbar">
    <button class="menu-toggle" onclick="toggleSidebar()"><i data-feather="menu"></i></button>
    <h1 class="page-title">Lost & Found</h1>
    <div class="topbar-right">
      <button class="btn btn-primary" onclick="openForm()">
        <i data-feather="plus"></i> Report Item
      </button>
    </div>
  </header>

  <div class="section" style="padding-top:20px">

    <!-- SUBMIT FORM -->
    <div class="form-card" id="report-form" style="display:none">
      <div class="form-title">📋 Report Lost / Found Item</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Item Type *</label>
          <select id="f-type">
            <option value="LOST">LOST — I lost something</option>
            <option value="FOUND">FOUND — I found something</option>
          </select>
        </div>
        <div class="form-group">
          <label>Item Name *</label>
          <input type="text" id="f-name" placeholder="e.g. Employee ID card, Mobile phone"/>
        </div>
        <div class="form-group">
          <label>Where Lost / Found *</label>
          <input type="text" id="f-location" placeholder="e.g. Gate-1, SMS Canteen, Sector-4"/>
        </div>
        <div class="form-group">
          <label>Date *</label>
          <input type="date" id="f-date"/>
        </div>
        <div class="form-group">
          <label>Your Name *</label>
          <input type="text" id="f-contact" placeholder="Full name"/>
        </div>
        <div class="form-group">
          <label>Contact Phone *</label>
          <input type="tel" id="f-phone" placeholder="10-digit mobile"/>
        </div>
        <div class="form-group full">
          <label>Description</label>
          <textarea id="f-desc" placeholder="Describe the item — color, brand, distinguishing features..."></textarea>
        </div>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-ghost" onclick="closeForm()">Cancel</button>
        <button class="btn btn-primary" onclick="submitItem()"><i data-feather="send"></i> Submit Report</button>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filters">
      <button class="filter-btn active" onclick="applyFilter({}, this)">All</button>
      <button class="filter-btn" onclick="applyFilter({item_type:'LOST'}, this)">🔴 Lost</button>
      <button class="filter-btn" onclick="applyFilter({item_type:'FOUND'}, this)">🟢 Found</button>
      <button class="filter-btn" onclick="applyFilter({status:'OPEN'}, this)">⏳ Open</button>
      <button class="filter-btn" onclick="applyFilter({status:'RESOLVED'}, this)">✅ Resolved</button>
      <input type="text" class="filter-btn search-input" placeholder="Search items..." oninput="searchItems(this.value)" style="border-radius:20px"/>
    </div>

    <!-- TABLE -->
    <div id="lf-table">
      <div class="loading-msg"><div class="spinner"></div></div>
    </div>

  </div>

  <footer class="footer">VSP Smart Portal | RINL Vizag Steel | Internal Use Only</footer>
</main>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
feather.replace();

let currentParams = {};

function openForm() {
  document.getElementById('report-form').style.display = 'block';
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('report-form').scrollIntoView({ behavior:'smooth' });
}

function closeForm() {
  document.getElementById('report-form').style.display = 'none';
}

async function submitItem() {
  const data = {
    item_type:     document.getElementById('f-type').value,
    item_name:     document.getElementById('f-name').value.trim(),
    location_name: document.getElementById('f-location').value.trim(),
    date_reported: document.getElementById('f-date').value,
    contact_name:  document.getElementById('f-contact').value.trim(),
    contact_phone: document.getElementById('f-phone').value.trim(),
    description:   document.getElementById('f-desc').value.trim(),
  };

  if (!data.item_name || !data.contact_name || !data.contact_phone || !data.date_reported) {
    showToast('Please fill all required fields (*)', 'error');
    return;
  }

  try {
    await API.createLostFound(data);
    showToast('Report submitted successfully!', 'success');
    closeForm();
    // Clear form
    ['f-name','f-location','f-contact','f-phone','f-desc'].forEach(id => document.getElementById(id).value = '');
    loadItems(currentParams);
  } catch (e) {
    showToast('Submission failed: ' + e.message, 'error');
  }
}

async function loadItems(params = {}) {
  currentParams = params;
  try {
    const res = await API.getLostFound(params);
    renderTable(res.data);
  } catch {
    document.getElementById('lf-table').innerHTML = '<div class="loading-msg">Failed to load data</div>';
  }
}

function renderTable(items) {
  const el = document.getElementById('lf-table');
  if (!items.length) {
    el.innerHTML = `<div class="empty-state">
      <i data-feather="inbox"></i>
      <h4>No records found</h4>
      <p>No lost or found items reported yet.</p>
    </div>`;
    feather.replace();
    return;
  }
  el.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Type</th>
            <th>Item</th>
            <th>Description</th>
            <th>Location</th>
            <th>Contact</th>
            <th>Phone</th>
            <th>Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${items.map(r => `
            <tr>
              <td>${r.id}</td>
              <td>${badge(r.item_type)}</td>
              <td><strong>${r.item_name}</strong></td>
              <td style="max-width:180px;font-size:0.8rem;color:var(--text-secondary)">${r.description || '—'}</td>
              <td>${r.location_name || '—'}</td>
              <td>${r.contact_name}</td>
              <td>${r.contact_phone}</td>
              <td>${formatDate(r.date_reported)}</td>
              <td>${badge(r.status)}</td>
              <td>
                <div style="display:flex;gap:6px;flex-wrap:wrap">
                  ${r.status === 'OPEN' ? `<button class="btn btn-success" style="padding:5px 10px;font-size:0.75rem" onclick="markResolved(${r.id})">✓ Resolved</button>` : ''}
                  <button class="btn btn-ghost" style="padding:5px 10px;font-size:0.75rem;color:var(--accent-red)" onclick="deleteItem(${r.id})">✕</button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

async function markResolved(id) {
  try {
    await API.updateLFStatus(id, 'RESOLVED');
    showToast('Marked as resolved!', 'success');
    loadItems(currentParams);
  } catch (e) {
    showToast('Failed: ' + e.message, 'error');
  }
}

async function deleteItem(id) {
  if (!confirm('Delete this record?')) return;
  try {
    await API.deleteLF(id);
    showToast('Record deleted', 'success');
    loadItems(currentParams);
  } catch (e) {
    showToast('Delete failed: ' + e.message, 'error');
  }
}

function applyFilter(params, btn) {
  document.querySelectorAll('.filters .filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  loadItems(params);
}

async function searchItems(q) {
  await loadItems({ ...currentParams, search: q });
}

// Auto-open form if #report in URL
if (window.location.hash === '#report') openForm();

loadItems();
</script>
</body>
</html>
